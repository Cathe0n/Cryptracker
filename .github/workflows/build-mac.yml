name: Build macOS DMG

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.24'
          cache: true

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Wails
        run: go install github.com/wailsapp/wails/v2/cmd/wails@latest

      - name: Initialize Wails Project
        run: |
          if [ ! -f "wails.json" ]; then
            $(go env GOPATH)/bin/wails init -n Cryptracer-MacOS -t vanilla
          fi

      - name: Install Frontend Dependencies
        run: |
          if [ -d "frontend" ]; then
            cd frontend && npm install
          fi

      - name: Build Application Bundle
        run: $(go env GOPATH)/bin/wails build -platform darwin/universal

      - name: Create DMG
        run: |
          hdiutil create -volname "Cryptracer" -srcfolder build/bin/Cryptracer.app -ov -format UDZO build/bin/Cryptracer-Installer.dmg

      - name: Upload DMG Artifact
        uses: actions/upload-artifact@v4
        with:
          name: macos-installer
          path: build/bin/*.dmg