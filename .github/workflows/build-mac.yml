name: Build macOS DMG

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.24'

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Wails
        run: go install github.com/wailsapp/wails/v2/cmd/wails@latest

      - name: Install Frontend Dependencies
        run: |
          # Wails standard structure usually has a 'frontend' folder. 
          # If your JS/HTML is just in 'public', Wails will handle it via wails.json.
          if [ -d "frontend" ]; then
            cd frontend && npm install
          fi

      - name: Build Application Bundle
        run: |
          # -platform darwin/universal builds for both Intel and Apple Silicon
          # -package creates the .app bundle structure required for a DMG
          wails build -platform darwin/universal -package

      - name: Create DMG
        run: |
          hdiutil create -volname "Cryptracer" -srcfolder build/bin -ov -format UDZO build/bin/Cryptracer-Installer.dmg

      - name: Upload DMG Artifact
        uses: actions/upload-artifact@v4
        with:
          name: macos-installer
          path: build/bin/*.dmg